services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent.dev
    command: pnpm --filter @fridge2recipe/api dev
    env_file:
      - .env.agent.local
    environment:
      AGENT_MODE: "1"
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - agent_api_node_modules:/app/node_modules
      - agent_api_app_node_modules:/app/apps/api/node_modules
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent.dev
    command: pnpm --filter @fridge2recipe/web dev:agent
    env_file:
      - .env.agent.local
    environment:
      AGENT_MODE: "1"
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - agent_web_node_modules:/app/node_modules
      - agent_web_app_node_modules:/app/apps/web/node_modules
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s

volumes:
  agent_api_node_modules:
  agent_api_app_node_modules:
  agent_web_node_modules:
  agent_web_app_node_modules:
